- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade all packages
  apt:
    upgrade: dist

- name: Install base packages
  apt:
    name:
      - curl
      - vim
      - htop
      - ufw
    state: present

- name: Create unprivileged app user
  user:
    name: "{{ app_user }}"
    groups: sudo
    shell: /bin/bash
    create_home: true

- name: Add SSH key for app user
  authorized_key:
    user: "{{ app_user }}"
    key: "{{ lookup('file', ssh_public_key_path) }}"

- name: Allow SSH through ufw
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP through ufw
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS through ufw
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Allow k3s API through ufw
  community.general.ufw:
    rule: allow
    port: "6443"
    proto: tcp

- name: Enable ufw with default deny
  community.general.ufw:
    state: enabled
    policy: deny

- name: Check if swap file already exists
  stat:
    path: /swapfile
  register: swap_file

- name: Create swap file
  command: fallocate -l {{ swap_size_mb }}M /swapfile
  when: not swap_file.stat.exists

- name: Set swap file permissions
  file:
    path: /swapfile
    mode: "0600"
  when: not swap_file.stat.exists

- name: Format swap file
  command: mkswap /swapfile
  when: not swap_file.stat.exists

- name: Enable swap
  command: swapon /swapfile
  when: not swap_file.stat.exists

- name: Add swap entry to fstab
  lineinfile:
    path: /etc/fstab
    line: "/swapfile none swap sw 0 0"
