name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/zero-to-prod-app

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: app
        run: pip install -r requirements-dev.txt

      - name: Lint
        working-directory: app
        run: ruff check .

      - name: Test
        working-directory: app
        run: pytest

  build-and-push:
    needs: lint-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check cluster config
        id: check
        run: |
          if [ -n "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::KUBE_CONFIG secret not set, skipping deploy"
          fi

      - uses: azure/setup-kubectl@v4
        if: steps.check.outputs.configured == 'true'

      - name: Configure kubeconfig
        if: steps.check.outputs.configured == 'true'
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy
        if: steps.check.outputs.configured == 'true'
        run: |
          kubectl apply -f k8s/
          kubectl set image deployment/zero-to-prod-app app=${{ env.IMAGE }}:${{ github.sha }}
          kubectl rollout status deployment/zero-to-prod-app
